<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案探索 — 标题</title>
<style>
:root {
  --ivory:   #FAF9F5; --slate:   #141413; --clay:    #D97757;
  --oat:     #E3DACC; --olive:   #788C5D;
  --gray-150:#F0EEE6; --gray-300:#D1CFC5; --gray-500:#87867F;
  --gray-700:#3D3D3A; --white:   #FFFFFF;
  --serif: ui-serif, Georgia, serif;
  --sans:  system-ui, -apple-system, sans-serif;
  --mono:  ui-monospace, "SF Mono", Menlo, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--ivory); color: var(--gray-700); line-height: 1.55; padding: 56px 32px 96px; }
.page { max-width: 1360px; margin: 0 auto; }

header { margin-bottom: 48px; max-width: 760px; }
.eyebrow { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-500); margin-bottom: 12px; }
h1 { font-family: var(--serif); font-weight: 500; font-size: 38px; line-height: 1.15; color: var(--slate); margin-bottom: 18px; letter-spacing: -0.01em; }
.prompt-box { background: var(--gray-150); border: 1.5px solid var(--gray-300); border-radius: 12px; padding: 16px 20px; font-size: 14.5px; }
.prompt-box .label { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gray-500); display: block; margin-bottom: 6px; }

.approaches { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 28px; }
@media (max-width: 1100px) { .approaches { grid-template-columns: 1fr; } }

.approach { background: var(--white); border: 1.5px solid var(--gray-300); border-radius: 12px; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
.approach-head h2 { font-family: var(--serif); font-weight: 500; font-size: 21px; color: var(--slate); margin-bottom: 6px; }
.num { display: inline-block; font-family: var(--mono); font-size: 12px; background: var(--oat); color: var(--slate); padding: 2px 8px; border-radius: 8px; margin-right: 8px; vertical-align: 3px; }

.code { background: var(--slate); border-radius: 12px; padding: 18px 20px; overflow-x: auto; }
.code pre { font-family: var(--mono); font-size: 13px; line-height: 1.65; color: #E8E6DE; white-space: pre; }
.code .kw  { color: var(--clay); }
.code .str { color: var(--olive); }
.code .cm  { color: var(--gray-500); }

.tradeoffs { border: 1.5px solid var(--gray-300); border-radius: 8px; overflow: hidden; font-size: 13px; }
.tradeoffs .row { display: grid; grid-template-columns: 1fr 1fr; }
.tradeoffs .row + .row { border-top: 1.5px solid var(--gray-300); }
.tradeoffs .cell { padding: 10px 14px; }
.tradeoffs .cell:first-child { border-right: 1.5px solid var(--gray-300); }
.tradeoffs .head { background: var(--gray-150); font-weight: 600; color: var(--slate); font-size: 12px; text-transform: uppercase; }
.tradeoffs .pro::before, .tradeoffs .con::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; vertical-align: 2px; }
.tradeoffs .pro::before { background: var(--olive); }
.tradeoffs .con::before { background: var(--clay); }

.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { font-family: var(--mono); font-size: 11.5px; background: var(--gray-150); border: 1.5px solid var(--gray-300); color: var(--gray-700); padding: 5px 10px; border-radius: 8px; white-space: nowrap; }
.chip strong { color: var(--slate); font-weight: 600; }

.reco { border-left: 4px solid var(--clay); background: var(--white); border-radius: 0 12px 12px 0; padding: 24px 28px; max-width: 860px; margin-top: 56px; }
.reco h2 { font-family: var(--serif); font-weight: 500; font-size: 22px; color: var(--slate); margin-bottom: 10px; }
.reco p { font-size: 15px; margin-bottom: 8px; }
.reco code { font-family: var(--mono); font-size: 0.92em; background: var(--gray-150); padding: 1px 6px; border-radius: 4px; }
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="eyebrow">方案探索 · 项目</div>
    <h1>标题 — N 种方案</h1>
    <div class="prompt-box">
      <span class="label">Prompt</span>
      展示 N 种不同的方案来解决 XXX 问题，包含代码、权衡分析和推荐方案。
    </div>
  </header>

  <section class="approaches">
    <article class="approach">
      <header class="approach-head">
        <h2><span class="num">01</span>方案名称</h2>
        <p>简短描述</p>
      </header>
      <div class="code"><pre><span class="kw">code</span> <span class="fn">goes</span> <span class="str">here</span></pre></div>
      <div class="tradeoffs">
        <div class="row head"><div class="cell">Pro</div><div class="cell">Con</div></div>
        <div class="row"><div class="cell pro">优势</div><div class="cell con">劣势</div></div>
      </div>
      <div class="chips"><span class="chip">维度: <strong>值</strong></span></div>
    </article>
  </section>

  <aside class="reco">
    <h2>推荐方案</h2>
    <p>推荐理由...</p>
  </aside>
</div>
</body>
</html>
